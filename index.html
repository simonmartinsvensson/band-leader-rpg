<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Lock zoom/scaling for a fullscreen game on phones. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Band Leader RPG</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #0b0b12;
        overflow: hidden;
        overscroll-behavior: none;
        /* No native touch gestures (scroll, double-tap zoom) or text selection. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #game canvas {
        touch-action: none;
        /* Keep pixel art crisp when the canvas is CSS-scaled to fit the screen. */
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
